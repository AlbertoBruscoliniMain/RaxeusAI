<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaxeusAI</title>
  <link rel="icon" type="image/png" href="/static/logo.png?v=2">
  <link rel="shortcut icon" type="image/png" href="/static/logo.png?v=2">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="topbar">
    <img id="logo" src="/static/logo.png" alt="Raxeus">
    <button id="btn-info" title="Info">ⓘ</button>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="cerca...">
    </div>

    <div id="tabs"></div>

    <button id="btn-new">+</button>

    <div id="color-dot-wrap">
      <div id="color-dot"></div>
      <div id="color-picker" class="hidden">
        <div class="picker-label">Colore bolla</div>
        <div id="presets"></div>
        <input type="color" id="custom-color" title="Colore custom">
      </div>
    </div>
  </div>

  <div id="chat-area"></div>

  <div id="input-wrap">
    <div id="img-preview-strip"></div>
    <div id="input-bar">
      <label id="btn-attach" title="Allega immagini (max 3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <input type="file" id="img-input" accept="image/*" multiple style="display:none">
      </label>
      <textarea id="msg-input" rows="1" placeholder="Messaggio..."></textarea>
      <button id="btn-send">invia</button>
    </div>
  </div>

  <div id="info-overlay" class="hidden">
    <div id="info-modal">
      <button id="info-close">✕</button>
      <div id="info-cards"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="window._katexReady = true"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
